<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Quản trị | Thanh Bình BĐS</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="admin.css?v=20260713-v8"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"></head><body>
<div id="loginView" class="login-shell"><form id="loginForm" class="login-card"><div class="brand">THANH BÌNH BĐS</div><h1>Đăng nhập quản trị</h1><p>Dùng tài khoản đã tạo trong Firebase Authentication.</p><label>Email<input id="email" type="email" required autocomplete="username"></label><label>Mật khẩu<input id="password" type="password" required autocomplete="current-password"></label><button type="submit">Đăng nhập</button><div id="loginError" class="error"></div></form></div>
<div id="appView" class="app hidden"><aside><div class="logo">THANH BÌNH BĐS<small>CMS QUẢN TRỊ</small></div><nav><button class="nav active" data-view="list">Danh sách BĐS</button><button class="nav" data-view="form">+ Thêm bất động sản</button><button class="nav" data-view="leads">Khách quan tâm</button><a href="../" target="_blank">Xem website</a></nav><button id="logoutBtn" class="logout">Đăng xuất</button></aside><main><header>
  <div><h1 id="pageTitle">Danh sách bất động sản</h1><p id="userEmail"></p></div>
  <div class="admin-header-actions">
    <button id="addBtn" class="primary">+ Thêm mới</button>
  </div>
</header>
<section id="listView"><div class="toolbar"><input id="searchInput" placeholder="Tìm theo tiêu đề, vị trí..."><select id="filterCategory"><option value="all">Tất cả hạng mục</option><option value="dat-nen">Đất nền</option><option value="nha-pho">Nhà phố</option><option value="can-ho">Căn hộ</option><option value="nha-vuon">Nhà vườn</option><option value="dat-nong-nghiep">Đất nông nghiệp</option><option value="nghi-duong">BĐS nghỉ dưỡng</option><option value="du-an">Dự án</option></select></div><div id="propertyList" class="property-list"></div></section>
<section id="formView" class="hidden"><form id="propertyForm" class="form-card"><input type="hidden" id="docId"><div class="grid"><label class="span2">Tiêu đề *<input id="title" required></label><label class="span2">Đường dẫn landing page (slug)<input id="slug" placeholder="Ví dụ: dat-nen-dien-tho"></label><label>Hạng mục *<select id="category" required><option value="">Chọn hạng mục</option><option value="dat-nen">Đất nền</option><option value="nha-pho">Nhà phố</option><option value="can-ho">Căn hộ</option><option value="nha-vuon">Nhà vườn</option><option value="dat-nong-nghiep">Đất nông nghiệp</option><option value="nghi-duong">BĐS nghỉ dưỡng</option><option value="du-an">Dự án</option></select></label><label>Trạng thái<select id="status"><option value="dang-ban">Đang chào bán</option><option value="da-coc">Đã cọc</option><option value="da-ban">Đã bán</option><option value="tam-an">Tạm ẩn</option></select></label><label>Giá<input id="price" placeholder="Ví dụ: 379 triệu"></label><label>Diện tích<input id="area" placeholder="Ví dụ: 90 m²"></label><label>Vị trí<input id="location" placeholder="Diên Thọ, Khánh Hòa"></label><label>Pháp lý<input id="legal" placeholder="Sổ hồng riêng"></label><label class="span2">Ảnh đại diện (URL hoặc đường dẫn file)<input id="image" placeholder="assets/images/anh.jpg hoặc https://..."></label><label class="span2">Danh sách ảnh (mỗi dòng một URL/đường dẫn)<textarea id="images" rows="5"></textarea></label><label class="span2">Video YouTube<input id="video" placeholder="https://youtube.com/shorts/..."></label><label class="span2">Tọa độ lô đất
  <input id="coordinates" placeholder="Ví dụ: 12.2809061,108.9996348">
  <small class="field-help">Chỉ cần nhập vĩ độ,kinh độ. Website tự tạo bản đồ và nút chỉ đường.</small>
</label>
<label class="span2">Link Google Maps (không bắt buộc)
  <input id="map" placeholder="Dán link Google Maps nếu chưa có tọa độ">
</label><label class="span2">Mô tả<textarea id="description" rows="5"></textarea></label><label>Giao thông<textarea id="traffic" rows="4"></textarea></label><label>Tiện ích<textarea id="utilities" rows="4"></textarea></label><label>Nghỉ dưỡng<textarea id="resort" rows="4"></textarea></label><label>Tiềm năng đầu tư<textarea id="investment" rows="4"></textarea></label><label class="check"><input id="featured" type="checkbox"> Sản phẩm nổi bật</label></div><div class="actions"><button type="button" id="cancelBtn" class="secondary">Hủy</button><button type="submit" class="primary">Lưu bất động sản</button></div><div id="formMessage"></div></form></section>
<section id="leadsView" class="hidden">
  <div class="toolbar">
    <input id="leadSearch" placeholder="Tìm tên, số điện thoại, bất động sản...">
    <select id="leadStatusFilter">
      <option value="all">Tất cả trạng thái</option>
      <option value="moi">Mới</option>
      <option value="da-lien-he">Đã liên hệ</option>
    </select>
  </div>
  <div id="leadList" class="lead-list"></div>
</section>
</main></div>
<script type="module" src="admin.js?v=20260713-v8"></script></body></html>
